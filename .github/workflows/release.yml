# Release via Changesets + npm Trusted Publishing (OIDC).
#
# Trusted Publishing means NO long-lived NPM_TOKEN: configure the package's
# trusted publisher on npmjs.com to point at this workflow, use npm >= 11.5.1,
# and provenance attestations are generated automatically.
#
# PR creation: Changesets opens a "Version Packages" PR. The default GITHUB_TOKEN
# cannot create PRs while "Allow GitHub Actions to create and approve pull requests"
# is OFF (our secure default). Instead we use a **fine-grained PAT** stored as the
# repo secret `CHANGESETS_TOKEN` (permissions: Contents read/write + Pull requests
# read/write on this repo). This keeps GITHUB_TOKEN locked down. Until that secret
# exists, this workflow fails at the PR-create step — that is expected.
#
# NOTE: SHA-pin action refs before going live (Renovate handles it).
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # PAT so the Changesets "Version Packages" PR is created without enabling
          # "Allow GitHub Actions to create and approve pull requests".
          token: ${{ secrets.CHANGESETS_TOKEN }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing requires npm >= 11.5.1; Node 22 bundles npm 10.x.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - uses: changesets/action@v1
        with:
          version: npm run release:version
          publish: npm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}
